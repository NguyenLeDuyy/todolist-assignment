<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRT Todo List - Nguyễn Lê Duy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body class="bg-light">
    <div class="container mt-5" style="max-width: 700px;">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="text-center mb-4 text-primary">Quản Lý Công Việc</h2>

                <!-- Form Thêm Công Việc -->
                <form id="addForm" class="input-group mb-4">
                    <input type="text" id="taskInput" class="form-control form-control-lg"
                        placeholder="Bạn muốn làm gì hôm nay?" required>
                    <button class="btn btn-primary" type="submit">
                        <i class="bi bi-plus-circle"></i> Thêm
                    </button>
                </form>

                <!-- Bộ Lọc -->
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span class="text-muted" id="taskCount">Đang tải...</span>
                    <select id="filterSelect" class="form-select w-auto">
                        <option value="all">Tất cả công việc</option>
                        <option value="true">Đã hoàn thành</option>
                        <option value="false">Chưa hoàn thành</option>
                    </select>
                </div>

                <!-- Danh sách công việc -->
                <ul id="taskList" class="list-group">
                    <!-- Javascript sẽ đổ dữ liệu vào đây -->
                </ul>
            </div>
        </div>
    </div>

    <!-- Nhúng file logic JS -->
    <script src="main.js"></script>
</body>

</html>
